# Config de OpenEvolve para la vertical de calibración CAL-1 (λ₁+μ, §2).
#
# Lanzamiento:
#   python -m mock_llm.server --port 8000          # (terminal aparte, si se usa el mock)
#   openevolve-run calibracion/programa_inicial.py evaluators/agx_l1_mu.py \
#       --config configs/calibracion.yaml --iterations 200
#
# Cambiar de proveedor = cambiar SOLO api_base/name/api_key (§8):
#   mock local :  api_base: http://127.0.0.1:8000/v1    name: mock
#   Ollama     :  api_base: http://localhost:11434/v1   name: gemma3:4b
#   Fireworks / vLLM en MI300X (día 6): api_base del endpoint + api_key real
max_iterations: 1000
checkpoint_interval: 25
random_seed: 42
diff_based_evolution: true
max_code_length: 20000

llm:
  models:
    - name: "mock"
      api_base: "http://127.0.0.1:8000/v1"
      api_key: "mock"
      weight: 1.0
  temperature: 0.7
  timeout: 120
  retries: 3

prompt:
  num_top_programs: 3
  num_diverse_programs: 2

database:
  population_size: 200
  archive_size: 50
  num_islands: 3

evaluator:
  timeout: 60
  cascade_evaluation: false
  parallel_evaluations: 1
